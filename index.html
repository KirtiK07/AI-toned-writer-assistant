<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Writing Assistant (Local)</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <header>
      <h1>✍️ AI Writing Assistant</h1>
      <p class="subtitle">Running locally with Ollama — no API key needed.</p>
    </header>

    <!-- Model selector (auto-populated from Ollama) -->
    <section class="card">
      <label for="model">Model</label>
      <select id="model">
        <option value="llama3.2">llama3.2 (loading...)</option>
      </select>
      <p style="font-size:0.8rem; color:#888; margin-top:0.5rem;">
        Pull more models with: <code>ollama pull mistral</code>
      </p>
    </section>

    <!-- Topic Input -->
    <section class="card">
      <label for="topic">What do you want to write about?</label>
      <textarea id="topic" placeholder="e.g. The importance of sleep for productivity" rows="4"></textarea>
    </section>

    <!-- Tone Selector -->
    <section class="card">
      <label>Choose a tone</label>
      <div class="tone-grid">
        <button class="tone-btn active" data-tone="formal">🎩 Formal</button>
        <button class="tone-btn" data-tone="casual">😊 Casual</button>
        <button class="tone-btn" data-tone="persuasive">🔥 Persuasive</button>
        <button class="tone-btn" data-tone="friendly">🤝 Friendly</button>
        <button class="tone-btn" data-tone="technical">⚙️ Technical</button>
        <button class="tone-btn" data-tone="creative">🎨 Creative</button>
      </div>
    </section>

    <!-- Options -->
    <section class="card options-row">
      <div class="option-group">
        <label for="length">Length</label>
        <select id="length">
          <option value="short">Short (1-2 paragraphs)</option>
          <option value="medium" selected>Medium (3-4 paragraphs)</option>
          <option value="long">Long (5+ paragraphs)</option>
        </select>
      </div>
      <div class="option-group">
        <label for="format">Format</label>
        <select id="format">
          <option value="paragraph">Paragraphs</option>
          <option value="bullets">Bullet Points</option>
          <option value="email">Email</option>
          <option value="linkedin">LinkedIn Post</option>
        </select>
      </div>
      <div class="option-group">
        <label for="audience">Audience</label>
        <select id="audience">
          <option value="general">General Public</option>
          <option value="students">Students</option>
          <option value="professionals">Professionals</option>
          <option value="executives">Executives</option>
        </select>
      </div>
    </section>

    <button id="generate-btn" onclick="generateContent()">Generate ✨</button>

    <!-- Output Panel -->
    <section class="card output-card" id="output-section" style="display:none;">
      <div class="output-header">
        <label>Generated Content</label>
        <button class="copy-btn" onclick="copyOutput()">📋 Copy</button>
      </div>
      <div id="output-text"></div>
      <div id="loading" style="display:none;" class="loading">
        <div class="spinner"></div>
        <span>Writing your content locally...</span>
      </div>
    </section>

    <p class="api-note">
      💡 Make sure Ollama is running: <code>ollama serve</code> &nbsp;|&nbsp;
      Flask server: <code>python app.py</code>
    </p>
  </div>

  <script>
    // =============================================
    // TONE SELECTION
    // =============================================
    let selectedTone = "formal";
    document.querySelectorAll(".tone-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tone-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        selectedTone = btn.dataset.tone;
      });
    });

    // =============================================
    // LOAD AVAILABLE OLLAMA MODELS ON PAGE LOAD
    // =============================================
    async function loadModels() {
      try {
        const res = await fetch("http://localhost:5000/models");
        const data = await res.json();
        const select = document.getElementById("model");
        if (data.models && data.models.length > 0) {
          select.innerHTML = data.models
            .map(m => `<option value="${m}">${m}</option>`)
            .join("");
        }
      } catch {
        document.getElementById("model").innerHTML =
          '<option value="llama3.2">llama3.2 (default)</option>';
      }
    }
    loadModels();

    // =============================================
    // GENERATE CONTENT — calls Flask backend
    // =============================================
    async function generateContent() {
      const topic    = document.getElementById("topic").value.trim();
      const length   = document.getElementById("length").value;
      const format   = document.getElementById("format").value;
      const audience = document.getElementById("audience").value;
      const model    = document.getElementById("model").value;

      if (!topic) { alert("Please enter a topic first!"); return; }

      const outputSection = document.getElementById("output-section");
      const outputText    = document.getElementById("output-text");
      const loading       = document.getElementById("loading");
      const btn           = document.getElementById("generate-btn");

      outputSection.style.display = "flex";
      outputText.textContent = "";
      loading.style.display = "flex";
      btn.disabled = true;
      btn.textContent = "Writing...";

      try {
        const response = await fetch("http://localhost:5000/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ topic, tone: selectedTone, length, format, audience, model }),
        });

        const data = await response.json();
        if (data.error) throw new Error(data.error);
        outputText.textContent = data.result;

      } catch (err) {
        outputText.textContent = `❌ Error: ${err.message}\n\nMake sure:\n1. Ollama is running (ollama serve)\n2. Flask is running (python app.py)\n3. You have pulled a model (ollama pull llama3.2)`;
      } finally {
        loading.style.display = "none";
        btn.disabled = false;
        btn.textContent = "Generate ✨";
      }
    }

    // =============================================
    // COPY OUTPUT
    // =============================================
    function copyOutput() {
      const text = document.getElementById("output-text").textContent;
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector(".copy-btn");
        btn.textContent = "✅ Copied!";
        setTimeout(() => { btn.textContent = "📋 Copy"; }, 2000);
      });
    }
  </script>
</body>
</html>
